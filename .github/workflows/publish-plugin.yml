name: Review & Publish Plugin

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Required by jbaruch/coding-policy/.github/actions/skill-review:
          # the action runs `git diff $BEFORE..HEAD` to find changed skills.
          fetch-depth: 0

      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      # Reviews only the skills whose files changed in this push, against the
      # latest published jbaruch/coding-policy.
      #
      # De-vendored: this was an inline copy of the composite that wrapped the
      # `tessl skill review` call with credit-outage tolerance, because the
      # upstream action couldn't express it. The action now has a native
      # `credit-outage` input (jbaruch/coding-policy#188 / #190), so this is
      # back to a pinned `uses:` — no more drift from the ~90-line copy.
      #
      # `credit-outage: skip` is fail-SAFE and narrow: ONLY a tessl "out of
      # credits" (403) billing outage skips the affected skill (flagged in the
      # run summary and the action's `unreviewed-skills` output); every other
      # review failure — a below-threshold score, an auth error, a tooling bug
      # — still hard-fails the publish.
      - name: Skill review (changed only)
        uses: jbaruch/coding-policy/.github/actions/skill-review@3e3f74e90f1ff6ae283fedc51a7191d1b628b543
        with:
          threshold: '85'
          credit-outage: 'skip'

      - name: Lint plugin
        run: tessl plugin lint .

      - uses: tesslio/patch-version-publish@v1
        with:
          token: ${{ secrets.TESSL_TOKEN }}
